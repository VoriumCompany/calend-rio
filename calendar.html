<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queiroz Advogados — Agenda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2A7E78;
      --primary-light: #3a9e97;
      --primary-pale: #e8f5f4;
      --bg: #f0f4f8;
      --white: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #94a3b8;
      --sidebar-w: 220px;

      --c1: #d1fae5; --c1b: #059669;
      --c2: #fef3c7; --c2b: #d97706;
      --c3: #dbeafe; --c3b: #2563eb;
      --c4: #fce7f3; --c4b: #db2777;
      --c5: #ede9fe; --c5b: #7c3aed;
      --c6: #e8f5f4; --c6b: #2A7E78;
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ===== LOADING ===== */
    #loadingScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--white); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
    }
    .load-logo { font-size: 2.5rem; }
    .load-text { font-size: .85rem; color: var(--muted); font-weight: 500; }
    .load-bar { width: 180px; height: 3px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .load-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 99px; animation: loadAnim 1.6s ease forwards; }
    @keyframes loadAnim { to { width: 100%; } }

    /* ===== APP SHELL ===== */
    #app { display: none; height: 100vh; }
    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--white); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 1.5rem 1rem;
      overflow: hidden;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 2rem; padding: 0 .5rem;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: white; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(42,126,120,0.3);
    }
    .logo-text { font-size: .95rem; font-weight: 800; color: var(--primary); letter-spacing: -.01em; line-height: 1.2; }
    .logo-sub { font-size: .65rem; color: var(--muted); font-weight: 500; }

    .nav-section { font-size: .65rem; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: .25rem .5rem; margin-bottom: .35rem; margin-top: .75rem; }

    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .75rem; border-radius: 10px; cursor: pointer;
      font-size: .85rem; font-weight: 500; color: #64748b;
      transition: all .18s; border: none; background: none; width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: #f8fafc; color: var(--text); }
    .nav-item.active { background: var(--primary-pale); color: var(--primary); font-weight: 700; }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

    .nav-spacer { flex: 1; }

    .user-info {
      display: flex; align-items: center; gap: .65rem;
      padding: .75rem; border-radius: 12px; background: #f8fafc;
      border: 1px solid var(--border); margin-top: .5rem;
    }
    .user-av {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: white;
    }
    .user-info-text { flex: 1; min-width: 0; }
    .user-info-name { font-size: .8rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info-role { font-size: .68rem; color: var(--muted); }
    .btn-logout-sm {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: none; border: 1px solid #e2e8f0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; color: var(--muted); transition: all .2s;
    }
    .btn-logout-sm:hover { background: #fee2e2; border-color: #fca5a5; color: #ef4444; }

    /* ===== MAIN ===== */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Top bar */
    .topbar {
      height: 64px; background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center; gap: .5rem;
      background: #f8fafc; border: 1px solid var(--border); border-radius: 10px;
      padding: .45rem .85rem; width: 220px;
    }
    .search-box input {
      border: none; background: none; font-size: .82rem; color: var(--text);
      outline: none; font-family: 'Inter', sans-serif; width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }

    .topbar-spacer { flex: 1; }

    .topbar-btns { display: flex; align-items: center; gap: .5rem; }
    .tb-btn {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 1rem; color: var(--muted); transition: all .2s;
    }
    .tb-btn:hover { background: #f8fafc; color: var(--text); }

    .topbar-av {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: white; cursor: pointer;
      border: 2px solid var(--primary-pale);
    }

    /* Calendar area */
    .cal-area { flex: 1; overflow-y: auto; overflow-x: auto; padding: 1.5rem; }

    /* Calendar header */
    .cal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .cal-month { font-size: 1.4rem; font-weight: 800; color: var(--text); }
    .cal-nav { display: flex; align-items: center; gap: .35rem; }
    .cal-nav-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: .9rem; color: var(--muted); transition: all .18s;
    }
    .cal-nav-btn:hover { background: var(--primary-pale); color: var(--primary); border-color: rgba(42,126,120,.3); }
    .cal-header-spacer { flex: 1; }
    .view-toggle { display: flex; background: #f1f5f9; border-radius: 10px; padding: .25rem; gap: .25rem; }
    .view-btn {
      padding: .4rem .9rem; border-radius: 7px; font-size: .8rem; font-weight: 600;
      cursor: pointer; border: none; background: none; color: var(--muted); transition: all .2s;
    }
    .view-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .btn-add-new {
      display: flex; align-items: center; gap: .4rem;
      padding: .5rem 1rem; border-radius: 10px; font-size: .82rem; font-weight: 700;
      background: var(--primary); color: white; border: none; cursor: pointer;
      transition: all .2s; box-shadow: 0 4px 12px rgba(42,126,120,.3);
    }
    .btn-add-new:hover { background: var(--primary-light); transform: translateY(-1px); }

    /* ===== WEEK CALENDAR GRID ===== */
    .week-grid {
      background: var(--white); border-radius: 16px; border: 1px solid var(--border);
      overflow: hidden; min-width: 700px;
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
    }

    /* Days header row */
    .days-header { display: grid; grid-template-columns: 64px repeat(7, 1fr); border-bottom: 1px solid var(--border); }
    .days-header-corner { border-right: 1px solid var(--border); }
    .day-col-head {
      padding: .85rem .5rem; text-align: center; border-right: 1px solid var(--border);
      font-size: .8rem;
    }
    .day-col-head:last-child { border-right: none; }
    .day-name { font-weight: 600; color: var(--muted); text-transform: capitalize; font-size: .75rem; letter-spacing: .03em; }
    .day-num {
      font-size: 1.25rem; font-weight: 800; color: var(--text); margin-top: .15rem;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; margin: .25rem auto 0;
    }
    .day-col-head.today .day-num { background: var(--primary); color: white; }
    .day-col-head.today .day-name { color: var(--primary); font-weight: 700; }

    /* Time rows */
    .time-grid { display: grid; grid-template-columns: 64px repeat(7, 1fr); }

    .time-label {
      padding: 0 .75rem; height: 80px; display: flex; align-items: flex-start;
      padding-top: .6rem; font-size: .72rem; font-weight: 600; color: var(--muted);
      border-right: 1px solid var(--border); flex-shrink: 0;
    }

    .time-cell {
      height: 80px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9;
      position: relative; padding: .35rem;
    }
    .time-cell:last-child { border-right: none; }

    /* Event card in cell */
    .event-card {
      border-radius: 10px; padding: .55rem .7rem;
      border-left: 3px solid; cursor: pointer;
      transition: all .18s; position: relative;
      margin-bottom: .3rem;
    }
    .event-card:hover { filter: brightness(.96); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }

    .event-code { font-size: .68rem; font-weight: 700; margin-bottom: .2rem; }
    .event-title { font-size: .78rem; font-weight: 700; line-height: 1.3; margin-bottom: .4rem; }
    .event-time { font-size: .68rem; color: rgba(0,0,0,.5); margin-bottom: .5rem; }

    .event-avatars { display: flex; gap: -4px; }
    .ev-av {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700; color: white; margin-left: -4px; flex-shrink: 0;
    }
    .ev-av:first-child { margin-left: 0; }

    /* TALL event card (spans 1.5 hours = ~120px) */
    .event-card.tall {
      position: absolute; top: .35rem; left: .35rem; right: .35rem;
      height: calc(160px - .7rem);
      display: flex; flex-direction: column;
    }

    /* === MINE highlight === */
    .event-card.mine-event { box-shadow: 0 0 0 2px var(--primary); }

    /* ===== MONTH VIEW ===== */
    .month-view { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,.05); }
    .month-head { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
    .month-head-day { padding: .6rem; text-align: center; font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .month-cell {
      min-height: 90px; padding: .5rem; border-right: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9; position: relative;
    }
    .month-cell:nth-child(7n) { border-right: none; }
    .month-num { font-size: .82rem; font-weight: 700; color: var(--muted); margin-bottom: .35rem; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .month-cell.today-cell .month-num { background: var(--primary); color: white; }
    .month-cell.other-month .month-num { color: #cbd5e1; }
    .month-event {
      padding: .2rem .5rem; border-radius: 6px; font-size: .7rem; font-weight: 600;
      margin-bottom: .2rem; cursor: pointer; border-left: 3px solid;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .month-event:hover { filter: brightness(.95); }

    /* ===== RIGHT PANEL ===== */
    .right-panel { width: 280px; flex-shrink: 0; background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .rp-head { padding: 1.25rem 1.25rem .75rem; border-bottom: 1px solid var(--border); }
    .rp-title { font-size: .85rem; font-weight: 700; margin-bottom: .25rem; }
    .rp-sub { font-size: .72rem; color: var(--muted); }
    .rp-body { padding: 1rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: .75rem; }

    .mini-session {
      padding: .85rem; border-radius: 12px; border: 1px solid var(--border);
      cursor: pointer; transition: all .18s;
    }
    .mini-session:hover { border-color: rgba(42,126,120,.4); background: var(--primary-pale); }
    .mini-session.mine-session { border-color: rgba(42,126,120,.5); background: var(--primary-pale); }
    .ms-date { font-size: .68rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
    .ms-time { font-size: .82rem; font-weight: 700; margin-bottom: .25rem; }
    .ms-advs { font-size: .72rem; color: var(--muted); line-height: 1.5; }
    .ms-badge { display: inline-flex; align-items: center; gap: .2rem; padding: .15rem .5rem; border-radius: 99px; font-size: .65rem; font-weight: 700; background: var(--primary); color: white; margin-top: .35rem; }

    /* Assiduidade panel */
    .assi-mini { padding: 1rem; border-top: 1px solid var(--border); }
    .assi-mini-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }
    .assi-pct { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .assi-bar { height: 6px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin: .5rem 0; }
    .assi-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 99px; transition: width .5s; }
    .assi-detail-btn {
      width: 100%; padding: .5rem; border-radius: 8px; font-size: .78rem; font-weight: 600;
      background: var(--primary-pale); border: 1px solid rgba(42,126,120,.25); color: var(--primary);
      cursor: pointer; transition: all .2s; margin-top: .5rem;
    }
    .assi-detail-btn:hover { background: rgba(42,126,120,.15); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(15,23,42,.4); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white); border-radius: 20px; padding: 2rem;
      width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,.15);
      transform: scale(.96); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.05rem; font-weight: 800; }
    .modal-close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 1.1rem; color: var(--muted); transition: all .18s; }
    .modal-close:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
    .modal-date { font-size: .82rem; color: var(--muted); display: flex; align-items: center; gap: .4rem; margin-bottom: 1rem; }
    .modal-time { font-size: 2rem; font-weight: 900; color: var(--text); margin-bottom: 1.5rem; }
    .modal-section-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
    .modal-advs { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.5rem; }
    .modal-adv {
      display: flex; align-items: center; gap: .65rem; padding: .6rem .8rem;
      border-radius: 10px; background: #f8fafc; border: 1px solid var(--border);
    }
    .modal-adv.me { background: var(--primary-pale); border-color: rgba(42,126,120,.35); }
    .modal-adv-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: white; flex-shrink: 0; }
    .modal-adv-name { font-size: .85rem; font-weight: 600; flex: 1; }
    .modal-adv-me { font-size: .68rem; font-weight: 700; color: var(--primary); background: rgba(42,126,120,.1); padding: .15rem .5rem; border-radius: 99px; }
    .presence-btns { display: flex; gap: .5rem; }
    .presence-btn {
      flex: 1; padding: .65rem; border-radius: 10px; font-size: .82rem; font-weight: 700;
      cursor: pointer; border: 1px solid; transition: all .2s;
    }
    .presence-btn.present { background: #d1fae5; border-color: #6ee7b7; color: #059669; }
    .presence-btn.absent { background: #fee2e2; border-color: #fca5a5; color: #ef4444; }
    .presence-btn.pending { background: #f1f5f9; border-color: var(--border); color: var(--muted); }
    .presence-btn.selected-present { background: #059669; border-color: #059669; color: white; box-shadow: 0 4px 12px rgba(5,150,105,.3); }
    .presence-btn.selected-absent { background: #ef4444; border-color: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239,68,68,.3); }

    /* ===== DETAIL PANEL (slides in) ===== */
    .detail-panel {
      position: fixed; right: -380px; top: 0; bottom: 0; width: 360px; z-index: 500;
      background: var(--white); border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,.08);
      transition: right .3s cubic-bezier(.16,1,.3,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .detail-panel.open { right: 0; }
    .dp-head {
      padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem;
    }
    .dp-close { margin-left: auto; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 1rem; color: var(--muted); transition: all .18s; }
    .dp-close:hover { background: #f1f5f9; }
    .dp-body { flex: 1; overflow-y: auto; padding: 1.25rem; }

    /* ===== SPINNER ===== */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(42,126,120,.3); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TOAST ===== */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; padding: .75rem 1.2rem; border-radius: 12px; font-size: .85rem; font-weight: 600; backdrop-filter: blur(12px); display: flex; align-items: center; gap: .5rem; animation: toastIn .25s ease both; background: #d1fae5; border: 1px solid #6ee7b7; color: #059669; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .toast.error { background: #fee2e2; border-color: #fca5a5; color: #ef4444; }
    @keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

    /* ===== SCROLLBAR ===== */
    .cal-area::-webkit-scrollbar { width: 5px; height: 5px; }
    .cal-area::-webkit-scrollbar-track { background: transparent; }
    .cal-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .right-panel { display: none; }
      .sidebar { width: 64px; }
      .sidebar-logo .logo-text, .sidebar-logo .logo-sub, .nav-item span:not(.nav-icon), .nav-section, .user-info-text { display: none; }
      .nav-item { justify-content: center; padding: .65rem; }
      .user-info { padding: .5rem; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="load-logo">⚖️</div>
  <div class="load-text">QUEIROZ ADVOGADOS</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<!-- App -->
<div id="app">
<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚖️</div>
      <div>
        <div class="logo-text">QUEIROZ</div>
        <div class="logo-sub">Advogados</div>
      </div>
    </div>

    <div class="nav-section">Menu</div>
    <button class="nav-item" onclick="setView('week')">
      <span class="nav-icon">📊</span>
      <span>Dashboard</span>
    </button>
    <button class="nav-item active" onclick="setView('week')">
      <span class="nav-icon">📅</span>
      <span>Agenda</span>
    </button>
    <button class="nav-item" onclick="openRoteiro()">
      <span class="nav-icon">📝</span>
      <span>Roteiro</span>
    </button>
    <button class="nav-item" onclick="openConteudo()">
      <span class="nav-icon">🎯</span>
      <span>Conteúdos</span>
    </button>

    <div class="nav-spacer"></div>

    <div class="user-info">
      <div class="user-av" id="sidebarInitials">?</div>
      <div class="user-info-text">
        <div class="user-info-name" id="sidebarName">...</div>
        <div class="user-info-role">Advogado(a)</div>
      </div>
      <button class="btn-logout-sm" onclick="doLogout()" title="Sair">🚪</button>
    </div>
  </aside>

    if (!currentLawyer) return;
    const parts = currentLawyer.nome.split(' ');
    const initials = parts.length >= 2 ? parts[0][0]+parts[1][0] : parts[0][0];
    ['sidebarInitials','topbarInitials'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=initials; });
    const n = document.getElementById('sidebarName'); if(n) n.textContent = parts[0]+' '+parts[parts.length-1];
  }

  // ===== ATTENDANCE =====
  async function loadAttendance() {
    if (USE_SUPABASE && currentUser) {
      const { data } = await sb.from('attendance').select('sessao_id,estado').eq('user_id', currentUser.id);
      attendanceData = {};
      if (data) data.forEach(r => { attendanceData[r.sessao_id] = r.estado; });
    } else {
      // localStorage fallback
      const saved = localStorage.getItem('qv_attendance_' + currentLawyerId);
      attendanceData = saved ? JSON.parse(saved) : {};
    }
  }

  function saveAttendanceLocal() {
    localStorage.setItem('qv_attendance_' + currentLawyerId, JSON.stringify(attendanceData));
  }

  async function setPresence(estado) {
    if (!currentModalSessao) return;
    const sid = currentModalSessao.id;
    attendanceData[sid] = estado;

    const bp = document.getElementById('btnPresente');
    const ba = document.getElementById('btnAusente');
    bp.className = 'presence-btn ' + (estado === 'presente' ? 'selected-present' : 'present');
    ba.className = 'presence-btn ' + (estado === 'ausente' ? 'selected-absent' : 'absent');

    if (USE_SUPABASE && currentUser) {
      try {
        await sb.from('attendance').upsert({ user_id: currentUser.id, sessao_id: sid, estado, updated_at: new Date().toISOString() }, { onConflict: 'user_id,sessao_id' });
      } catch { showToast('Erro ao salvar', true); return; }
    } else {
      saveAttendanceLocal();
    }
    showToast('✓ Presença salva!');
    renderRightPanel();
    renderCalendar();
  }

  // ===== NAVIGATION =====
  function navigate(dir) {
    if (currentView === 'week') {
      currentWeekStart = new Date(currentWeekStart);
      currentWeekStart.setDate(currentWeekStart.getDate() + dir * 7);
    } else {
      const d = new Date(currentWeekStart);
      d.setMonth(d.getMonth() + dir, 1);
      currentWeekStart = d;
    }
    renderCalendar();
  }

  function setView(v) {
    currentView = v;
    document.getElementById('btnWeek').classList.toggle('active', v==='week');
    document.getElementById('btnMonth').classList.toggle('active', v==='month');
    // Nav items
    document.querySelectorAll('.nav-item').forEach((el,i) => el.classList.toggle('active', i===1));
    renderCalendar();
  }

  // ===== CALENDAR RENDER =====
  function renderCalendar() {
    if (currentView === 'week') renderWeek();
    else renderMonth();
  }

  function renderWeek() {
    const ws = currentWeekStart;
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws);
      d.setDate(ws.getDate() + i);
      days.push(d);
    }

    // Title
    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const startM = months[days[0].getMonth()];
    const endM = months[days[6].getMonth()];
    const yr = days[0].getFullYear();
    document.getElementById('calMonthTitle').textContent = startM === endM
      ? `${startM}, ${yr}` : `${startM} – ${endM}, ${yr}`;

    const today = new Date(); today.setHours(0,0,0,0);
    const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const timeSlots = ['09:00','10:00','11:00','12:00'];

    // Build days header
    let daysHeader = `<div class="days-header-corner"></div>`;
    days.forEach(d => {
      const isToday = d.getTime() === today.getTime();
      daysHeader += `<div class="day-col-head ${isToday?'today':''}">
        <div class="day-name">${dayNames[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>`;
    });

    // Build time rows
    let timeRows = '';
    timeSlots.forEach((t, ti) => {
      timeRows += `<div class="time-label">${t}</div>`;
      days.forEach(d => {
        // Find session on this day at this time slot
        const sessaoNow = SESSOES.find(s => {
          const sd = new Date(s.date); sd.setHours(0,0,0,0);
          return sd.getTime() === d.getTime();
        });

        let cellContent = '';
        if (sessaoNow && ti === 0) { // sessions at 09:00
          const isMine = sessaoNow.advogados.includes(currentLawyerId);
          const col = COLORS[(sessaoNow.id - 1) % COLORS.length];
          const advNamesShort = sessaoNow.advogados.slice(0, 3).map(id => {
            const a = ADVOGADOS.find(x => x.id === id);
            return a ? a.nome.split(' ')[0] : '?';
          }).join(', ');

          // Avatars
          const avatars = sessaoNow.advogados.slice(0, 4).map(id => {
            const a = ADVOGADOS.find(x => x.id === id);
            const initials = a ? a.nome.split(' ').map(w=>w[0]).slice(0,2).join('') : '?';
            const isMe = id === currentLawyerId;
            return `<div class="ev-av" style="background:${isMe ? col.border : col.av};opacity:${isMe?1:0.7}">${initials}</div>`;
          }).join('');

          const presState = attendanceData[sessaoNow.id];
          const presIcon = presState === 'presente' ? '✓' : presState === 'ausente' ? '✗' : '';

          cellContent = `
            <div class="event-card tall ${isMine?'mine-event':''}"
              style="background:${col.bg};border-left-color:${col.border}"
              onclick="openSessionModal(${sessaoNow.id})">
              <div class="event-code" style="color:${col.border}">#S${sessaoNow.id.toString().padStart(3,'0')} ${presIcon}</div>
              <div class="event-title" style="color:${col.text}">${sessaoNow.tipo}</div>
              <div class="event-time" style="color:${col.border}">📹 ${sessaoNow.hora}</div>
              <div style="font-size:.68rem;color:${col.text};opacity:.75;margin-bottom:.4rem;line-height:1.4">${advNamesShort}...</div>
              <div class="event-avatars">${avatars}</div>
            </div>`;
        }

        timeRows += `<div class="time-cell">${cellContent}</div>`;
      });
    });

    document.getElementById('calContainer').innerHTML = `
      <div class="week-grid">
        <div class="days-header">${daysHeader}</div>
        <div class="time-grid">${timeRows}</div>
      </div>`;
  }

  function renderMonth() {
    const d = new Date(currentWeekStart);
    d.setDate(1);
    const month = d.getMonth();
    const year = d.getFullYear();
    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    document.getElementById('calMonthTitle').textContent = `${months[month]}, ${year}`;

    const today = new Date(); today.setHours(0,0,0,0);
    const firstDow = d.getDay(); // 0=Sun
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    let head = dayNames.map(n => `<div class="month-head-day">${n}</div>`).join('');

    let cells = '';
    // Prev month padding
    for (let i = firstDow - 1; i >= 0; i--) {
      cells += `<div class="month-cell other-month"><div class="month-num">${prevMonthDays - i}</div></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const cellDate = new Date(year, month, day);
      const isToday = cellDate.getTime() === today.getTime();
      const sessionsOnDay = SESSOES.filter(s => {
        const sd = new Date(s.date); sd.setHours(0,0,0,0);
        return sd.getTime() === cellDate.getTime();
      });

      let eventsHtml = '';
      sessionsOnDay.forEach(s => {
        const col = COLORS[(s.id-1) % COLORS.length];
        const isMine = s.advogados.includes(currentLawyerId);
        const pres = attendanceData[s.id];
        eventsHtml += `<div class="month-event ${isMine?'mine-event':''}"
          style="background:${col.bg};border-left-color:${col.border};color:${col.text}"
          onclick="openSessionModal(${s.id})">
          ${isMine?'★ ':''}S${s.id} ${pres==='presente'?'✓':pres==='ausente'?'✗':''}
        </div>`;
      });

      cells += `<div class="month-cell ${isToday?'today-cell':''}">
        <div class="month-num">${day}</div>
        ${eventsHtml}
      </div>`;
    }

    // Next month padding
    const totalCells = firstDow + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
      cells += `<div class="month-cell other-month"><div class="month-num">${i}</div></div>`;
    }

    document.getElementById('calContainer').innerHTML = `
      <div class="month-view">
        <div class="month-head">${head}</div>
        <div class="month-grid">${cells}</div>
      </div>`;
  }

  // ===== RIGHT PANEL =====
  function renderRightPanel() {
    if (!currentLawyer) return;
    const mySessoes = SESSOES.filter(s => s.advogados.includes(currentLawyerId));
    const presente = mySessoes.filter(s => attendanceData[s.id] === 'presente').length;
    const pct = mySessoes.length ? Math.round(presente/mySessoes.length*100) : 0;

    document.getElementById('rpSub').textContent = `${mySessoes.length} sessões agendadas`;
    document.getElementById('assiPct').textContent = pct + '%';
    document.getElementById('assiBarFill').style.width = pct + '%';
    document.getElementById('assiDetail').textContent = `${presente} de ${mySessoes.length} sessões`;

    document.getElementById('rpBody').innerHTML = mySessoes.map(s => {
      const isMine = true;
      const others = s.advogados.filter(id => id !== currentLawyerId).map(id => ADVOGADOS.find(a=>a.id===id)?.nome.split(' ')[0]).join(', ');
      const pres = attendanceData[s.id];
      const presLabel = pres === 'presente' ? '<span class="ms-badge">✓ Presente</span>' : pres === 'ausente' ? '<span class="ms-badge" style="background:#ef4444">✗ Ausente</span>' : '';
      const col = COLORS[(s.id-1) % COLORS.length];
      return `<div class="mini-session mine-session" onclick="openSessionModal(${s.id})" style="border-left:3px solid ${col.border}">
        <div class="ms-date">📅 ${s.dataStr}</div>
        <div class="ms-time">🎬 ${s.hora}</div>
        <div class="ms-advs">Com: ${others}</div>
        ${presLabel}
      </div>`;
    }).join('');
  }

  // ===== SESSION MODAL =====
  function openSessionModal(sessaoId) {
    const s = SESSOES.find(x => x.id === sessaoId);
    if (!s) return;
    currentModalSessao = s;
    const isMine = s.advogados.includes(currentLawyerId);

    document.getElementById('modalTitle').textContent = `Sessão #S${String(sessaoId).padStart(3,'0')}`;
    document.getElementById('modalDate').innerHTML = `📅 ${s.dataStr} &nbsp;·&nbsp; ${s.tipo}`;
    document.getElementById('modalTime').textContent = s.hora;

    const col = COLORS[(s.id-1) % COLORS.length];
    const advHtml = s.advogados.map(id => {
      const a = ADVOGADOS.find(x => x.id === id);
      if (!a) return '';
      const initials = a.nome.split(' ').map(w=>w[0]).slice(0,2).join('');
      const isMe = id === currentLawyerId;
      return `<div class="modal-adv ${isMe?'me':''}">
        <div class="modal-adv-av" style="background:${col.av}">${initials}</div>
        <div class="modal-adv-name">${a.nome}</div>
        ${isMe ? '<div class="modal-adv-me">Você</div>' : ''}
      </div>`;
    }).join('');
    document.getElementById('modalAdvs').innerHTML = advHtml;

    const presDiv = document.getElementById('modalPresence');
    if (isMine) {
      presDiv.style.display = 'block';
      const pres = attendanceData[s.id];
      document.getElementById('btnPresente').className = 'presence-btn ' + (pres==='presente' ? 'selected-present' : 'present');
      document.getElementById('btnAusente').className = 'presence-btn ' + (pres==='ausente' ? 'selected-absent' : 'absent');
    } else {
      presDiv.style.display = 'none';
    }

    document.getElementById('sessionModal').classList.add('open');
  }

  function closeSessionModal(e) {
    if (!e || e.target === document.getElementById('sessionModal')) {
      document.getElementById('sessionModal').classList.remove('open');
    }
  }

  // ===== ASSIDUIDADE MODAL =====
  function openAssiModal() {
    if (!currentLawyer) return;
    const mySessoes = SESSOES.filter(s => s.advogados.includes(currentLawyerId));
    const rows = mySessoes.map(s => {
      const pres = attendanceData[s.id];
      const icon = pres==='presente'?'<span style="color:#059669;font-weight:700">✓ Presente</span>':pres==='ausente'?'<span style="color:#ef4444;font-weight:700">✗ Ausente</span>':'<span style="color:#94a3b8">— Pendente</span>';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border-radius:10px;border:1px solid #f1f5f9;margin-bottom:.5rem">
        <div>
          <div style="font-weight:700;font-size:.85rem">📅 ${s.dataStr}</div>
          <div style="font-size:.75rem;color:#94a3b8;margin-top:.15rem">${s.hora} · Sessão ${s.id}</div>
        </div>
        <div>${icon}</div>
      </div>`;
    }).join('');

    const presente = mySessoes.filter(s=>attendanceData[s.id]==='presente').length;
    const pct = mySessoes.length ? Math.round(presente/mySessoes.length*100) : 0;

    document.getElementById('assiModalContent').innerHTML = `
      <div style="text-align:center;padding:1rem 0 1.5rem">
        <div style="font-size:3rem;font-weight:900;color:#2A7E78">${pct}%</div>
        <div style="font-size:.82rem;color:#94a3b8;margin-top:.25rem">${presente} de ${mySessoes.length} sessões confirmadas</div>
        <div style="height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin:1rem auto;max-width:200px">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2A7E78,#3a9e97);border-radius:99px"></div>
        </div>
      </div>
      ${rows}
    `;
    document.getElementById('assiModal').classList.add('open');
  }

  function closeAssiModal(e) {
    if (!e || e.target === document.getElementById('assiModal')) {
      document.getElementById('assiModal').classList.remove('open');
    }
  }

  // ===== ROTEIRO MODAL =====
  function openRoteiro() {
    if (!currentLawyer || !currentLawyer.roteiro) return;
    document.getElementById('roteiroModalTitle').textContent = `Roteiro — ${currentLawyer.nome.split(' ')[0]}`;
    const fullText = currentLawyer.roteiro.map(r=>r.texto).join('\n\n');
    document.getElementById('roteiroModalContent').innerHTML = `
      <div style="margin-bottom:1.25rem;padding:.85rem;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0">
        <div style="font-size:.72rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem">Tema</div>
        <div style="font-size:.92rem;font-weight:700">${currentLawyer.tema}</div>
        <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
          <span style="padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:600;background:#e8f5f4;color:#2A7E78;border:1px solid rgba(42,126,120,.3)">${currentLawyer.formato}</span>
          <span style="padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:600;background:#e8f5f4;color:#2A7E78;border:1px solid rgba(42,126,120,.3)">⏱ ${currentLawyer.duracao}</span>
          <span style="padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:600;background:#fef3c7;color:#d97706;border:1px solid rgba(217,119,6,.3)">📌 Prazo: ${currentLawyer.prazo}</span>
        </div>
      </div>
      <button onclick="copyText('${encodeURIComponent(fullText)}',this)" style="width:100%;padding:.65rem;border-radius:10px;font-size:.82rem;font-weight:700;background:#e8f5f4;border:1px solid rgba(42,126,120,.3);color:#2A7E78;cursor:pointer;margin-bottom:1rem;transition:all .2s" onmouseover="this.style.background='rgba(42,126,120,.15)'" onmouseout="this.style.background='#e8f5f4'">📋 Copiar roteiro completo</button>
      ${currentLawyer.roteiro.map((r,i)=>`
        <div style="background:#f8fafc;border-radius:12px;padding:1rem;border:1px solid #e2e8f0;margin-bottom:.75rem;position:relative">
          <button onclick="copyText('${encodeURIComponent(r.texto)}',this)" style="position:absolute;top:.65rem;right:.65rem;padding:.25rem .6rem;border-radius:7px;font-size:.68rem;font-weight:700;background:#e8f5f4;border:1px solid rgba(42,126,120,.3);color:#2A7E78;cursor:pointer">📋 Copiar</button>
          <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2A7E78;margin-bottom:.4rem">Parte ${i+1} — ${r.parte}</div>
          <div style="font-size:.88rem;line-height:1.75;color:#374151;padding-right:3.5rem">${r.texto}</div>
        </div>
      `).join('')}
    `;
    document.getElementById('roteiroModal').classList.add('open');
  }

  function closeRoteiroModal(e) {
    if (!e || e.target === document.getElementById('roteiroModal')) {
      document.getElementById('roteiroModal').classList.remove('open');
    }
  }

  // ===== CONTEÚDO MODAL =====
  function openConteudo() {
    if (!currentLawyer || !currentLawyer.conteudos) return;
    document.getElementById('conteudoModalContent').innerHTML = currentLawyer.conteudos.map((c,i) => {
      const col = COLORS[i % COLORS.length];
      return `<div style="padding:1rem;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:.75rem;border-left:3px solid ${col.border}">
        <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${col.border};margin-bottom:.35rem">Conteúdo ${c.num}</div>
        <div style="font-size:.95rem;font-weight:700;margin-bottom:.5rem">${c.tema}</div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">
          <span style="padding:.2rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600;background:#f1f5f9;color:#64748b">${c.tipo}</span>
          <span style="padding:.2rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600;background:#fef3c7;color:#d97706">📅 ${c.prazo}</span>
        </div>
      </div>`;
    }).join('');
    document.getElementById('conteudoModal').classList.add('open');
  }

  function closeConteudoModal(e) {
    if (!e || e.target === document.getElementById('conteudoModal')) {
      document.getElementById('conteudoModal').classList.remove('open');
    }
  }

  // ===== UTILS =====
  function copyText(encoded, btn) {
    navigator.clipboard.writeText(decodeURIComponent(encoded)).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado!';
      btn.style.background = '#d1fae5';
      btn.style.color = '#059669';
      setTimeout(() => { btn.textContent = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
    });
  }

  function showToast(msg, isError=false) {
    const t = document.createElement('div');
    t.className = 'toast' + (isError?' error':'');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  async function doLogout() {
    if (USE_SUPABASE && sb) await sb.auth.signOut();
    localStorage.removeItem('qv_lawyer_id');
    window.location.reload();
  }

  // ===== START =====
  init();
</script>
</body>
</html>
